version: '3.9'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    environment:
      - REACT_APP_SOCKET_URL=http://localhost:4000
    depends_on:
      - socket-server

  socket-server:
    build:
      context: .
      dockerfile: Dockerfile.socket
    ports:
      - '4000:4000'